# ===================================================================
# Ortak konfigurasyon - tum profiller icin gecerli.
# Ortama gore degisen ayarlar: application-local.yml / application-prod.yml
# Aktif profil yoksa "local" kullanilir.
# ===================================================================
spring:
  application:
    name: scorestv-backend
  profiles:
    default: local
  # .env dosyasini (varsa) ortam degiskeni gibi okur; yoksa hata vermez.
  config:
    import: "optional:file:.env[.properties]"

  # Cok parcali dosya yukleme. Ceviri Excel import'u + mobil "Bize Ulasin"
  # resim/video ekleri (5 dosya x 100MB). max-request-size tum govde icin.
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 520MB

  jpa:
    hibernate:
      ddl-auto: validate          # Sema yonetimi Flyway'de; Hibernate sadece dogrular
    open-in-view: false
    properties:
      hibernate:
        format_sql: false   # SQL tek satir halinde loglansin

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  cache:
    type: redis

  data:
    redis:
      repositories:
        enabled: false           # Redis sadece cache icin; repository taramasi kapali
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100       # Asiri buyuk sayfa istegi engellenir

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8080
  # Ters proxy arkasinda gercek istemci IP'sini cozmek icin (X-Forwarded-*).
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true

# --- Uygulamaya ozel ayarlar ---
scorestv:
  # ============================================================
  # Gorsel aynalama — API-Football "Image not available" placeholder filtresi.
  # Indirilen gorselin SHA-256'si bu listedeyse depolanmaz (mobil fallback
  # gosterir). Virgulle ayrilmis hex hash listesi; IMAGE_PLACEHOLDER_SHA256
  # env ile verilir. Hash bulma: bir placeholder gorseli indirip sha256sum.
  image:
    placeholder-sha256: ${IMAGE_PLACEHOLDER_SHA256:}

  # ============================================================
  # Elasticsearch — arama motoru (fixtures + teams + leagues + players + countries).
  # ============================================================
  # AYRI SUNUCUDA calismak uzere tasarlandi. Local'de docker-compose
  # uzerinden 9200'de calisir (security KAPALI). Prod'a tasinirken
  # sadece host/port/credentials env'lerini degistir, kod degismez.
  #
  # Local default:
  #   host=localhost  port=9200  scheme=http  username=  password=
  #
  # Prod ornek:
  #   ELASTICSEARCH_HOST=10.0.0.42
  #   ELASTICSEARCH_PORT=9200
  #   ELASTICSEARCH_SCHEME=https
  #   ELASTICSEARCH_USERNAME=elastic
  #   ELASTICSEARCH_PASSWORD=<degisken>
  #
  # enabled=false ise tum SearchService cagrilari no-op (uygulama calismaya
  # devam eder ama /api/v1/search bos doner).
  elasticsearch:
    enabled: ${ELASTICSEARCH_ENABLED:true}
    host: ${ELASTICSEARCH_HOST:localhost}
    port: ${ELASTICSEARCH_PORT:9200}
    scheme: ${ELASTICSEARCH_SCHEME:http}
    username: ${ELASTICSEARCH_USERNAME:}
    password: ${ELASTICSEARCH_PASSWORD:}
    # Index isimleri (prefix). Multi-tenant kullanmiyoruz ama prefix sayesinde
    # ayni cluster'i baska proje icin kullanmak istersek catismayi onler.
    index-prefix: ${ELASTICSEARCH_INDEX_PREFIX:scorestv}
    # Baglanti zaman asimi (ms).
    connect-timeout: ${ELASTICSEARCH_CONNECT_TIMEOUT:3000}
    socket-timeout: ${ELASTICSEARCH_SOCKET_TIMEOUT:10000}

  # Firebase Cloud Messaging — service account JSON path.
  # classpath: → resources icinde; file:/ → mutlak path (production icin onerilen).
  # Tanimli degilse FCM gonderim devre disi (backend calismaya devam eder).
  firebase:
    service-account-path: ${FIREBASE_SERVICE_ACCOUNT_PATH:}

  # ============================================================
  # Bilyoner iddaa oranlari. enabled=false ise oran akisi tamamen kapali
  # (fetch yok, match-detail'de odds=null). Bir sorun olursa BILYONER_ENABLED
  # env'i false yapip aninda kapatabilirsin.
  # affiliate-url: "Bilyoner'de oyna" butonunun acacagi tikla-git linki —
  # Bilyoner Ortaklik (affiliate) programindan alinan takip linki buraya konur.
  # ============================================================
  bilyoner:
    enabled: ${BILYONER_ENABLED:true}
    api-url: ${BILYONER_API_URL:https://www.bilyoner.com/api/v3/mobile/aggregator/gamelist/all/v1?tabType=1&bulletinType=2}
    affiliate-url: ${BILYONER_AFFILIATE_URL:https://www.bilyoner.com}
    cache-seconds: ${BILYONER_CACHE_SECONDS:120}
    kickoff-tolerance-minutes: ${BILYONER_KICKOFF_TOLERANCE:240}
    # Tam otomasyon: snapshot bu aralikla (ms) arka planda tazelenir
    # (BilyonerOddsJob — sadece enabled=true iken calisir).
    refresh-ms: ${BILYONER_REFRESH_MS:60000}

  # ============================================================
  # SocialData.tools — sag raydaki X/Twitter tweet akisi.
  # API anahtari GIZLI: sadece .env'de SOCIALDATA_API_KEY. enabled=false iken
  # hic istek atilmaz (bolum bos doner). Maliyet job tarafinda, ziyaretci basina degil.
  # ============================================================
  social:
    enabled: ${SOCIAL_ENABLED:true}
    # GÜVENLİK: gerçek anahtar varsayılanı kaldırıldı — env ile verilmeli (rotate et).
    api-key: ${SOCIALDATA_API_KEY:}
    base-url: ${SOCIAL_BASE_URL:https://api.socialdata.tools}
    # Virgulle ayrilmis X kullanici adlari (@'siz).
    accounts: ${SOCIAL_ACCOUNTS:Fenerbahce,GalatasaraySK,Besiktas,Trabzonspor,FIFAWorldCup,TFF_Org}
    max-per-account: ${SOCIAL_MAX_PER_ACCOUNT:8}
    max-total: ${SOCIAL_MAX_TOTAL:60}
    exclude-replies: ${SOCIAL_EXCLUDE_REPLIES:true}
    exclude-retweets: ${SOCIAL_EXCLUDE_RETWEETS:true}
    # Yenileme araligi (ms) — varsayilan 30 dk. initial-delay: acilistan sonra ilk cekim.
    refresh-ms: ${SOCIAL_REFRESH_MS:3600000}
    initial-delay-ms: ${SOCIAL_INITIAL_DELAY_MS:8000}

  # ============================================================
  # Basketbol (API-Basketball v1) — football'dan TAMAMEN ayri modul.
  # api-key football ile AYNI API-Sports anahtari (API_FOOTBALL_KEY).
  # enabled=false ise sync/job hic calismaz. live-enabled ayrica canli
  # skor periyodik cekimini acar.
  # ============================================================
  basketball:
    enabled: ${BASKETBALL_ENABLED:true}
    base-url: ${BASKETBALL_BASE_URL:https://v1.basketball.api-sports.io}
    api-key: ${API_FOOTBALL_KEY:}
    # NOT: API-Sports rate limit IP bazinda da toplaniyor (firewall) — futbol +
    # basketbol + voleybol AYNI sunucu IP'sinden cikiyor, birlikte sayiliyorlar.
    # Plan 20 istek/sn; ucu birlikte bu tavani asmasin diye 360/dk (~6/sn).
    # Futbol ~6/sn + bk 6/sn + vb 6/sn ≈ 18/sn (20'nin altinda guvenli pay).
    requests-per-minute: ${BASKETBALL_RPM:360}
    timezone: Europe/Istanbul
    today-cron: ${BASKETBALL_TODAY_CRON:0 */30 * * * *}
    live-enabled: ${BASKETBALL_LIVE_ENABLED:true}
    live-interval-seconds: ${BASKETBALL_LIVE_INTERVAL:15}
    # Kayan pencere (football ile ayni mantik): ±7 gun. Gunluk window-cron tum
    # pencereyi tarar; gecmis maclar finalize olur, gelecek fikstur dolar.
    window-days-before: ${BASKETBALL_WINDOW_BEFORE:7}
    window-days-after: ${BASKETBALL_WINDOW_AFTER:7}
    window-cron: ${BASKETBALL_WINDOW_CRON:0 0 4 * * *}
    # Ulke + lig referans seed cron (haftalik, Pazartesi 03:00).
    reference-cron: ${BASKETBALL_REFERENCE_CRON:0 0 3 * * 1}
    # Logo/bayrak aynalama (CDN) cron — saatlik :15.
    image-mirror-cron: ${BASKETBALL_IMAGE_MIRROR_CRON:0 15 * * * *}
    # Anasayfa goruntu/sunum ayarlari — sol ray populer ligler/takimlar.
    # Futbol scorestv.football.serving.* paritesi. Liste BOS ise ilgili
    # bolum sol rayda hic gorunmez (TUM liglere/takimlara DUSMEZ).
    serving:
      # Sol ray "Populer Ligler" — API-Basketball lig id'lerini SIRAYLA yaz.
      # Orn: [12,120,194] (NBA, EuroLeague, TR BSL — gercek id'ler DB'den).
      popular-league-ids: [12,2,117,52,104,166,270,281,120,197,202]
      # Sol ray "Populer Takimlar" — API-Basketball takim id'lerini SIRAYLA yaz.
      popular-team-ids: [3059,3032,3058,3020,3019,3150,3018,3054,3133,3148]
  # ============================================================
  # Voleybol (API-Volleyball v1) — football/basketball'dan TAMAMEN ayri modul.
  # api-key football ile AYNI API-Sports anahtari (API_FOOTBALL_KEY).
  # Voleybol API LEANER (oyuncu/mac-bazli stats yok). enabled=false ise
  # sync/job hic calismaz. live-enabled ayrica canli skor cekimini acar.
  # ============================================================
  volleyball:
    enabled: ${VOLLEYBALL_ENABLED:true}
    base-url: ${VOLLEYBALL_BASE_URL:https://v1.volleyball.api-sports.io}
    api-key: ${API_FOOTBALL_KEY:}
    # IP bazli ortak limit — bkz. basketbol notu. 360/dk (~6/sn) → futbol+bk+vb
    # birlikte ~18/sn, planin 20/sn tavaninin altinda.
    requests-per-minute: ${VOLLEYBALL_RPM:360}
    timezone: Europe/Istanbul
    today-cron: ${VOLLEYBALL_TODAY_CRON:0 */30 * * * *}
    live-enabled: ${VOLLEYBALL_LIVE_ENABLED:true}
    live-interval-seconds: ${VOLLEYBALL_LIVE_INTERVAL:15}
    # Kayan pencere: ±7 gun.
    window-days-before: ${VOLLEYBALL_WINDOW_BEFORE:7}
    window-days-after: ${VOLLEYBALL_WINDOW_AFTER:7}
    window-cron: ${VOLLEYBALL_WINDOW_CRON:0 0 4 * * *}
    # Ulke + lig referans seed cron (haftalik, Pazartesi 03:00).
    reference-cron: ${VOLLEYBALL_REFERENCE_CRON:0 0 3 * * 1}
    # Logo/bayrak aynalama (CDN) cron — saatlik :15.
    image-mirror-cron: ${VOLLEYBALL_IMAGE_MIRROR_CRON:0 15 * * * *}
    # Takim kadrosu (lig+sezon junction) cron — gunluk 04:30.
    team-sync-cron: ${VOLLEYBALL_TEAM_SYNC_CRON:0 30 4 * * *}
    serving:
      # One cikan voleybol lig id'leri — su an bos (ileride doldurulacak).
      featured-league-ids: ${VOLLEYBALL_FEATURED_LEAGUE_IDS:}
      # Ana ekran widget'i "gunun maclari" icin populer voleybol lig id'leri.
      # BOS ya da bugun bu liglerde mac yoksa bugunun TUM voleybolu kullanilir
      # (fallback). 172 = Efeler Ligi (TR erkekler). Daha fazla id ekleyebilirsin.
      popular-league-ids: [172,97,113,174,100,185,223,248,167,251]
  # ============================================================
  # Highlightly maç özeti/highlight entegrasyonu (soccer.highlightly.net).
  # Anahtar yalnız sunucuda (x-rapidapi-key). enabled=false iken hiç çağrı yok.
  # Açmak için: HIGHLIGHTLY_ENABLED=true + HIGHLIGHTLY_API_KEY=...
  # ============================================================
  highlightly:
    enabled: ${HIGHLIGHTLY_ENABLED:true}
    base-url: ${HIGHLIGHTLY_BASE_URL:https://soccer.highlightly.net}
    # GÜVENLİK: gerçek anahtar varsayılanı kaldırıldı — env ile verilmeli (rotate et).
    api-key: ${HIGHLIGHTLY_API_KEY:}
    timezone: ${HIGHLIGHTLY_TIMEZONE:Etc/UTC}
    limit: ${HIGHLIGHTLY_LIMIT:8}
    cache-ttl-minutes: ${HIGHLIGHTLY_CACHE_TTL:360}
    empty-cache-ttl-minutes: ${HIGHLIGHTLY_EMPTY_CACHE_TTL:30}
  # ============================================================
  # TheSportsDB TV yayını entegrasyonu (thesportsdb.com).
  # API-Football fixture id'si event.idAPIfootball ile eşleştirilir.
  # PREMIUM anahtar: v1 lookuptv ücretsizde 2 kanalla sınırlı, premiumda 100'e
  # kadar (tüm ülkeler) döner — bu yüzden V2'ye gerek yok. Anahtar kişiye özel
  # ve ÜCRETLİ; repo public ise THESPORTSDB_API_KEY env'iyle verip burada
  # tutmamak daha güvenli (gerekirse rotate et).
  # ============================================================
  thesportsdb:
    enabled: ${THESPORTSDB_ENABLED:true}
    base-url: ${THESPORTSDB_BASE_URL:https://www.thesportsdb.com/api/v1/json}
    # GÜVENLİK: gerçek anahtar varsayılanı kaldırıldı — env ile verilmeli (rotate et).
    api-key: ${THESPORTSDB_API_KEY:}
    timezone: ${THESPORTSDB_TIMEZONE:Etc/UTC}
    cache-ttl-minutes: ${THESPORTSDB_CACHE_TTL:720}
    empty-cache-ttl-minutes: ${THESPORTSDB_EMPTY_CACHE_TTL:180}
  api-football:
    base-url: https://v3.football.api-sports.io
    # Priority-aware saniye-bazli token bucket. API-Football'un Custom plani
    # dakika kotasi gevsek (1200/dk) ama saniye-burst guard sikti — 15+
    # paralel istek "Too many requests" tetikler. Iki ayri kova:
    #
    #   live-tokens-per-second  : Kullanici-bekleyen (/fixtures*) icin rezerv
    #                             slot. Score-triggered + lazy yogun olsa bile
    #                             canli skor gecikmez.
    #   lazy-tokens-per-second  : Arka plan sync (squad, transfer, sidelined,
    #                             trophy, coach, lig refresh) icin kapasite.
    #                             Burst durumunda burada beklenir.
    #
    # Onerilen degerler plan basina:
    #   Ultra   : LIVE=4 LAZY=2  (toplam 6/sn ~ 360/dk, 75k/gun ile uyumlu)
    #   Custom600: LIVE=8 LAZY=4  (toplam 12/sn ~ 720/dk, burst-guard guvenli)
    #
    # requests-per-minute: eski throttle icin tutulan tarihi alan, artik
    # kullanilmaz (token bucket replaced). Backward compat icin korunmustur.
    requests-per-minute: ${API_FOOTBALL_RPM:450}
    live-tokens-per-second: ${API_FOOTBALL_LIVE_TPS:4}
    lazy-tokens-per-second: ${API_FOOTBALL_LAZY_TPS:2}
  football:
    sync:
      # Zamanlanmis senkron isleri calissin mi (dev'de kapali tutulur).
      enabled: ${FOOTBALL_SYNC_ENABLED:false}
      # Anasayfa fikstur penceresi: bugun -before ... bugun +after gun.
      window-days-before: 7
      window-days-after: 7
      # Gun hesabinin yapilacagi saat dilimi (anasayfa "bugun" tanimi).
      timezone: Europe/Istanbul
      # Tam pencere senkronu cron ifadesi (her gun 04:00).
      window-cron: "0 0 4 * * *"
      # Referans veri (ulke/lig/sezon) senkronu cron'u (her Pazar 05:00).
      reference-cron: "0 0 5 * * SUN"
      # Bugun tazeleme cron'u (her saatin basinda). Alt liglerin gecikmeli
      # NS->FT/PST guncellemelerini en gec 1 saatte yakalar.
      today-refresh-cron: "0 0 * * * *"
      # Canli mac senkronu (GET /fixtures?live=all). Acik oldugunda her
      # live-interval-seconds saniyede bir API yoklanir ve degisimler
      # WebSocket /topic/fixtures/live/{lang} kanallarina yayilir.
      live-enabled: ${FOOTBALL_LIVE_ENABLED:false}
      live-interval-seconds: ${FOOTBALL_LIVE_INTERVAL:15}
      # Canli olay (gol/kart/penalti) yoklama araligi. Kaynak (/fixtures/events)
      # 15sn'de bir tazelenir; golun timeline detayini kaynakla AYNI hiza
      # cektik. Custom600 plani (600 req/dk) rahat tasir. NOT: SyncRateLimiter
      # EVENTS baseline'i ile uyumlu tutulmali (ikisi de 15sn).
      live-events-interval-seconds: ${FOOTBALL_EVENTS_INTERVAL:15}
      # Yaklasan-mac kadro yoklayicisi: kickoff'a 0-2 saat olanlar icin
      # her 15 dk'da bir /fixtures/lineups cagrisi. Ilk kadro geldiginde
      # /topic/fixtures/{id}/lineups WS push yapilir.
      imminent-lineups-interval-minutes: ${FOOTBALL_LINEUPS_INTERVAL:15}
      lineups-lookahead-hours: ${FOOTBALL_LINEUPS_LOOKAHEAD:2}
      # Canli istatistik (possession, shots, corners, ...) yoklama araligi.
      # API'nin onerdigi 60sn; pik gunlerde kota icin 90/120 yapabilirsin.
      live-statistics-interval-seconds: ${FOOTBALL_STATS_INTERVAL:60}
      # Canli oyuncu istatistik (rating, dakika, gol, asist, ...) yoklama
      # araligi. Kaynak dakikada bir tazelenir; kaynakla esitledik (60sn).
      live-player-stats-interval-seconds: ${FOOTBALL_PLAYER_STATS_INTERVAL:60}
      # "Covered" isaretli olmayan (alt ligler) maclar icin yoklama
      # araliklarinin carpani. 4 = non-covered icin events 30->120sn,
      # stats 60->240sn, player_stats 120->480sn. Pik kotayi koruyor.
      non-covered-rate-multiplier: ${FOOTBALL_NONCOVERED_MULT:4}
    # Anasayfa goruntu/sunum ayarlari.
    serving:
      # Anasayfa lig listesinin EN BASINDA, BU SIRAYLA gosterilecek
      # API-Football lig ID'leri. Listedeki sira = oncelik. Geri kalan
      # ligler bu listeden sonra "ulke adi (alfabetik) -> lig adi
      # (alfabetik)" duzeniyle sıralanır.
      #
      # Hicbiri girilmezse herseyf alfabetik gosterilir.
      # ID'leri https://www.api-football.com/documentation-v3 uzerinden
      # veya admin panelden lig kayitlarindan ogrenebilirsin.
      #
      # Ornek bazi populer ligler (yorumdan acip duzenleyebilirsin):
      #   2   UEFA Champions League
      #   3   UEFA Europa League
      #   848 UEFA Conference League
      #   39  Premier League (England)
      #   140 La Liga (Spain)
      #   135 Serie A (Italy)
      #   78  Bundesliga (Germany)
      #   61  Ligue 1 (France)
      #   203 Super Lig (Turkey)
      #   88  Eredivisie (Netherlands)
      #   94  Primeira Liga (Portugal)
      #   1   FIFA World Cup
      #   4   UEFA Euro
      #   5   UEFA Nations League
      featured-league-ids: [1,2,3,848,203,204,205,206,551,552,553,554,1007,1027,39,78,140,135,61,94,88,144,145,10,667]
      # Sol ray "Popüler Ligler" listesi — buraya elle lig ID'lerini sırayla yaz.
      # Örn: [203, 39, 140, 135, 78, 61, 2, 3, 848, 1]  (Süper Lig, PL, La Liga, ...)
      popular-league-ids: [1,2,3,848,203,39,78,140,135,61]
      # Sol ray "Ülkeler" listesi — buraya elle ülke ID'lerini sırayla yaz.
      popular-country-ids: [157,60,49,56,21,16,79,115,129]
      # Sol ray "Ülkeler" = milli takımlar. Takım (national team) ID'lerini sırayla yaz.
      popular-team-ids: [777,25,10,768,9,27,1118,2,1,]
  seo:
    # Public frontend temel adresi - canonical URL'ler bununla kurulur.
    site-url: ${SEO_SITE_URL:http://localhost:3000}
    # SEO tarih gosteriminin saat dilimi.
    timezone: Europe/Istanbul
  # ============================================================
  # IndexNow (Bing/Yandex hizli indeksleme). Yeni olusan ve yeni biten
  # maclarin canonical URL'leri periyodik olarak IndexNow'a gonderilir.
  # enabled=false varsayilan — deploy guvenli olsun, sonra INDEXNOW_ENABLED=true
  # + INDEXNOW_KEY ile acilir. key = web tarafinda public/<key>.txt ile eslesir;
  # host + keyLocation seo.site-url'den turetilir.
  # ============================================================
  indexnow:
    enabled: ${INDEXNOW_ENABLED:true}
    key: ${INDEXNOW_KEY:}
    # Gonderim araligi (dakika) — job her bu kadar surede son ~20dk'da degisen
    # (yeni/biten) maclari tarar. Kod: IndexNowSubmitJob.
    submit-interval-minutes: ${INDEXNOW_SUBMIT_INTERVAL:15}
  storage:
    # MinIO baglanti adresi (S3 API). Local: localhost; prod'da app icin http://minio:9000.
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ROOT_USER:minioadmin}
    secret-key: ${MINIO_ROOT_PASSWORD:minioadmin}
    bucket: ${MINIO_BUCKET:scorestv-media}
    # Gorsellerin herkese acik servis edildigi temel adres.
    public-url: ${STORAGE_PUBLIC_URL:http://localhost:9000/scorestv-media}
  security:
    jwt:
      access-token-ttl: PT15M     # 15 dakika
      refresh-token-ttl: P14D     # 14 gun
    google:
      # Google Cloud'daki OAuth client ID'leri (web/android/ios).
      # NOT: ${VAR:default} placeholder icinde virgul "default value separator"
      # olarak yorumlanir — bu yuzden YAML list syntax kullaniyoruz (Spring
      # virgullu string default'ini parse edemez, YAML list'i dogru bind eder).
      # Kabul edilen Google OAuth client id'leri (idToken aud kontrolu).
      # 1. Admin/web client (admin paneli Google girisi) — ihtiyaten korunuyor.
      # 2-4. Yeni Firebase projesi (scorestv-e889c): Android + iOS + Web client'lari.
      #      Mobil serverClientId kullanmadigi icin token aud = platform client id
      #      (Android'de Android, iOS'ta iOS client). Web ileride gerekebilir.
      client-ids:
        - 850334764490-nihi94238mnse9mr04i32qsd1b41913r.apps.googleusercontent.com
        - 202204490934-9drjggq97fft8nrhqbio911m6aspgv3j.apps.googleusercontent.com
        - 202204490934-2ll3r48acje0d64vmuacgkoj0qf4n5vu.apps.googleusercontent.com
        - 202204490934-qthde1dld01aodqn930ioes4om69pofm.apps.googleusercontent.com
    apple:
      client-ids:
        - com.scorestv.mobile
        - com.scorestv.scorestv
        - com.scorestv.scorestvMobile
        - com.scorestv.signin
  cors:
    # Virgulle ayrilmis origin listesi. Prod'da CORS_ALLOWED_ORIGINS ile verilir.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

  mail:
    # Sifre sifirlama e-postasindaki baglantinin temel adresi (frontend sayfasi).
    password-reset-url: ${PASSWORD_RESET_URL:https://scorestv.com/reset-password}