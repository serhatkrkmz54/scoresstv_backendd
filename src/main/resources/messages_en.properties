seo.fixture.description.ft.draw={0} vs {1} finished {2}-{3} in regular time as a draw. {6} match summary, {7}.
seo.fixture.description.ft.win={0} vs {1} finished {2}-{3} in regular time. {8} won the match. {6}, {7}.
seo.fixture.description.aet={0} vs {1} finished {2}-{3} after extra time. {8} won the match. {6}, {7}.
seo.fixture.description.pen={0} vs {1} ended in penalties {4}-{5}. {8} won the match. {6}, {7}.

