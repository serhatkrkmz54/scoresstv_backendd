# --- SEO: mac detay sayfasi (genel — bitmemis maclar) ---
seo.fixture.title={0} vs {1} - Live Score, Lineups & Stats | ScoresTV
seo.fixture.description=Follow {0} vs {1} live - real-time score, lineups, match events and statistics. {2}, {3}.
seo.fixture.keywords={0}, {1}, {0} vs {1}, live score, match result, lineups, {2}, football

# --- SEO: finished matches (FT/AET/PEN) ---
# MessageFormat args (common):
# {0}=home, {1}=away, {2}=hGoals, {3}=aGoals, {4}=penHome, {5}=penAway,
# {6}=league, {7}=date, {8}=winnerTeam
