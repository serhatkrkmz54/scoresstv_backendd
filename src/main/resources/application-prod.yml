# =============================================================================
# Production profile — Hetzner 3-server setup
# Activate: --spring.profiles.active=prod
#
# Tum bagimliklar internal network (10.0.0.0/24) uzerinden.
# Env'lerden okur — docker-compose .env'den gelir.
# =============================================================================

spring:
  application:
    name: scorestv-backend

  # --- PostgreSQL ---
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT:5432}/${POSTGRES_DB:scorestv}?ApplicationName=scorestv-backend&socketTimeout=30
    username: ${POSTGRES_USER:scorestv}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      # 10k user hedefi icin tuned. Tum degerler env override edilebilir
      # (JAR rebuild gerektirmez — sadece .env + docker compose restart).
      #
      # Sizing:
      #   max-pool=50      → 8vCPU DB icin guvenli tavan ((8*2)+1=17 baseline)
      #   min-idle=15      → cold start sonrasi hizli ramp-up
      #   conn-timeout=10s → peak'te 5s'lik 503 firtinasini onler
      #   idle/lifetime    → Hetzner internal network stabil, default oran
      #   leak=60s         → uzun tx'leri yakalar (job'larda kritik)
      maximum-pool-size: ${HIKARI_MAX_POOL:50}
      minimum-idle: ${HIKARI_MIN_IDLE:15}
      connection-timeout: ${HIKARI_CONNECTION_TIMEOUT:10000}
      idle-timeout: ${HIKARI_IDLE_TIMEOUT:300000}
      max-lifetime: ${HIKARI_MAX_LIFETIME:1200000}
      leak-detection-threshold: ${HIKARI_LEAK_DETECTION:60000}
      validation-timeout: ${HIKARI_VALIDATION_TIMEOUT:3000}
      pool-name: scorestv-hikari
      auto-commit: false

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          batch_size: 50
          fetch_size: 200
          time_zone: Europe/Istanbul
        order_inserts: true
        order_updates: true
        query:
          in_clause_parameter_padding: true
        connection:
          provider_disables_autocommit: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    out-of-order: false

  # --- Redis ---
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3000ms
      connect-timeout: 3000ms
      lettuce:
        pool:
          # 10k user icin tepe Redis cagrisi ~5-10k/s. Lettuce async, ama
          # peak'te min-idle dusuk olursa cold-connect cezasi var.
          max-active: ${REDIS_MAX_ACTIVE:64}
          max-idle: ${REDIS_MAX_IDLE:32}
          min-idle: ${REDIS_MIN_IDLE:8}
          max-wait: ${REDIS_MAX_WAIT:2000ms}

  cache:
    type: redis

  jackson:
    time-zone: ${SPRING_JACKSON_TIME_ZONE:Europe/Istanbul}
    deserialization:
      fail-on-unknown-properties: false

  threads:
    virtual:
      enabled: true

# --- Embedded Tomcat ---
# Virtual threads (spring.threads.virtual.enabled=true) acik iken Tomcat
# thread sayisi artik istek concurrency limiti DEGIL — sadece carrier pool
# tavani. Asagidaki degerler bol bol yetiyor, env ile override edilebilir.
server:
  port: 8080
  tomcat:
    threads:
      max: ${TOMCAT_THREADS_MAX:400}
      min-spare: ${TOMCAT_THREADS_MIN:50}
    accept-count: ${TOMCAT_ACCEPT_COUNT:200}
    max-connections: ${TOMCAT_MAX_CONNECTIONS:10000}
    connection-timeout: ${TOMCAT_CONNECTION_TIMEOUT:20000}
    accesslog:
      enabled: false            # nginx access log yeter
  compression:
    enabled: true
    mime-types: application/json,text/plain,text/css,text/javascript,application/javascript
    min-response-size: 1024
  forward-headers-strategy: framework
  http2:
    enabled: true
  shutdown: graceful
  error:
    include-message: never
    include-stacktrace: never
    include-binding-errors: never

# --- Actuator (Prometheus + health) ---
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,loggers,env,heapdump,threaddump
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState,diskSpace
        readiness:
          include: readinessState,db,redis
    prometheus:
      access: read-only
  health:
    # SMTP yapilandirilmamis — mail indicator devre disi (yoksa /health DOWN olur).
    # Mail servisi eklendiginde true yapilabilir veya kaldirilabilir.
    mail:
      enabled: false
  metrics:
    tags:
      application: scorestv-backend
      environment: prod
  prometheus:
    metrics:
      export:
        enabled: true

# --- Logging (JSON for Loki/Promtail) ---
logging:
  level:
    root: INFO
    com.scorestv: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
    org.springframework.security: WARN
  pattern:
    console: '{"time":"%d{ISO8601}","level":"%level","thread":"%thread","logger":"%logger{36}","msg":"%replace(%message){''[\r\n]+'',''\\\\n''}","trace_id":"%X{traceId:-}","span_id":"%X{spanId:-}"}%n'

# =============================================================================
# Uygulama-spesifik ayarlar
# =============================================================================
scorestv:
  elasticsearch:
    enabled: ${ELASTICSEARCH_ENABLED:true}
    host: ${ELASTICSEARCH_HOST}
    port: ${ELASTICSEARCH_PORT:9200}
    scheme: ${ELASTICSEARCH_SCHEME:http}
    username: ${ELASTICSEARCH_USERNAME:}
    password: ${ELASTICSEARCH_PASSWORD:}
    index-prefix: scorestv
    connect-timeout: 3000
    socket-timeout: 10000
    bootstrap-on-startup: true

  firebase:
    service-account-path: ${FIREBASE_SERVICE_ACCOUNT_PATH:}

  api-football:
    base-url: https://v3.football.api-sports.io
    key: ${API_FOOTBALL_KEY}
    requests-per-minute: ${API_FOOTBALL_RPM:400}

  football:
    sync:
      enabled: ${FOOTBALL_SYNC_ENABLED:true}
      # Canli pipeline (LiveTickerJob + events/stats/lineups + WS broadcast).
      # Bu bayrak kapaliyken tum @ConditionalOnProperty(live-enabled) bean'leri
      # olusmaz; canli skor/dakika WebSocket'e hic dusmez. Prod'da ACIK olmali.
      live-enabled: ${FOOTBALL_LIVE_ENABLED:true}
      # API-Football canli yoklama araligi (saniye). 15sn = skor/gol ~15sn'de duser.
      live-interval-seconds: ${FOOTBALL_LIVE_INTERVAL:15}

  security:
    jwt:
      secret: ${JWT_SECRET}
      access-token-ttl: PT1H
      refresh-token-ttl: P30D
    google:
      client-ids: ${GOOGLE_CLIENT_IDS}

  cors:
    allowed-origins:
      - https://scorestv.com
      - https://www.scorestv.com
      - https://admin.scorestv.com
      - https://api.scorestv.com
      # GEÇİCİ — local geliştirme (web + WebSocket) için. Prod'a tam geçince kaldır.
      - http://localhost:3000

  mail:
    password-reset-url: ${MAIL_PASSWORD_RESET_URL:https://scorestv.com/auth/reset-password}

  storage:
    # NOT: StorageProperties bean prefix "scorestv.storage" — minio nested DEGIL.
    endpoint: ${MINIO_ENDPOINT}
    access-key: ${MINIO_ACCESS_KEY}
    secret-key: ${MINIO_SECRET_KEY}
    bucket: ${MINIO_BUCKET:scorestv-assets}
    public-url: ${MINIO_PUBLIC_URL:https://cdn.scorestv.com/scorestv-assets}
