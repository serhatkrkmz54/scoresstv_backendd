# =============================================================================
# Production profile — Hetzner 3-server setup
# Activate: --spring.profiles.active=prod
#
# Tum bagimliklar internal network (10.0.0.0/24) uzerinden.
# Env'lerden okur — docker-compose .env'den gelir.
# =============================================================================

spring:
  application:
    name: scorestv-backend

  # --- PostgreSQL ---
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT:5432}/${POSTGRES_DB:scorestv}?ApplicationName=scorestv-backend&socketTimeout=30
    username: ${POSTGRES_USER:scorestv}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      # AGRESIF POOL — 8vCPU app + 8vCPU db, bol kaynak
      maximum-pool-size: 30
      minimum-idle: 10
      connection-timeout: 5000
      idle-timeout: 300000
      max-lifetime: 1200000
      leak-detection-threshold: 60000
      pool-name: scorestv-hikari
      auto-commit: false
      validation-timeout: 3000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          batch_size: 50
          fetch_size: 200
          time_zone: Europe/Istanbul
        order_inserts: true
        order_updates: true
        query:
          in_clause_parameter_padding: true
        connection:
          provider_disables_autocommit: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    out-of-order: false

  # --- Redis ---
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3000ms
      connect-timeout: 3000ms
      lettuce:
        pool:
          max-active: 32
          max-idle: 16
          min-idle: 4
          max-wait: 2000ms

  cache:
    type: redis

  jackson:
    time-zone: ${SPRING_JACKSON_TIME_ZONE:Europe/Istanbul}
    deserialization:
      fail-on-unknown-properties: false

  threads:
    virtual:
      enabled: true

# --- Embedded Tomcat ---
server:
  port: 8080
  tomcat:
    threads:
      max: 400                  # 8 vCPU * 50 thread guvenli tavan
      min-spare: 50
    accept-count: 200
    max-connections: 10000
    connection-timeout: 20000
    accesslog:
      enabled: false            # nginx access log yeter
  compression:
    enabled: true
    mime-types: application/json,text/plain,text/css,text/javascript,application/javascript
    min-response-size: 1024
  forward-headers-strategy: framework
  http2:
    enabled: true
  shutdown: graceful
  error:
    include-message: never
    include-stacktrace: never
    include-binding-errors: never

# --- Actuator (Prometheus + health) ---
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,loggers,env,heapdump,threaddump
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState,diskSpace
        readiness:
          include: readinessState,db,redis
    prometheus:
      access: read-only
  health:
    # SMTP yapilandirilmamis — mail indicator devre disi (yoksa /health DOWN olur).
    # Mail servisi eklendiginde true yapilabilir veya kaldirilabilir.
    mail:
      enabled: false
  metrics:
    tags:
      application: scorestv-backend
      environment: prod
  prometheus:
    metrics:
      export:
        enabled: true

# --- Logging (JSON for Loki/Promtail) ---
logging:
  level:
    root: INFO
    com.scorestv: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
    org.springframework.security: WARN
  pattern:
    console: '{"time":"%d{ISO8601}","level":"%level","thread":"%thread","logger":"%logger{36}","msg":"%replace(%message){''[\r\n]+'',''\\\\n''}","trace_id":"%X{traceId:-}","span_id":"%X{spanId:-}"}%n'

# =============================================================================
# Uygulama-spesifik ayarlar
# =============================================================================
scorestv:
  elasticsearch:
    enabled: ${ELASTICSEARCH_ENABLED:true}
    host: ${ELASTICSEARCH_HOST}
    port: ${ELASTICSEARCH_PORT:9200}
    scheme: ${ELASTICSEARCH_SCHEME:http}
    username: ${ELASTICSEARCH_USERNAME:}
    password: ${ELASTICSEARCH_PASSWORD:}
    index-prefix: scorestv
    connect-timeout: 3000
    socket-timeout: 10000
    bootstrap-on-startup: true

  firebase:
    service-account-path: ${FIREBASE_SERVICE_ACCOUNT_PATH:}

  api-football:
    base-url: https://v3.football.api-sports.io
    key: ${API_FOOTBALL_KEY}
    requests-per-minute: ${API_FOOTBALL_RPM:400}

  football:
    sync:
      enabled: ${FOOTBALL_SYNC_ENABLED:true}
      # Canli pipeline (LiveTickerJob + events/stats/lineups + WS broadcast).
      # Bu bayrak kapaliyken tum @ConditionalOnProperty(live-enabled) bean'leri
      # olusmaz; canli skor/dakika WebSocket'e hic dusmez. Prod'da ACIK olmali.
      live-enabled: ${FOOTBALL_LIVE_ENABLED:true}
      # API-Football canli yoklama araligi (saniye). 15sn = skor/gol ~15sn'de duser.
      live-interval-seconds: ${FOOTBALL_LIVE_INTERVAL:15}

  security:
    jwt:
      secret: ${JWT_SECRET}
      access-token-ttl: PT1H
      refresh-token-ttl: P30D
    google:
      client-ids: ${GOOGLE_CLIENT_IDS}

  cors:
    allowed-origins:
      - https://scorestv.com
      - https://www.scorestv.com
      - https://admin.scorestv.com
      - https://api.scorestv.com

  mail:
    password-reset-url: ${MAIL_PASSWORD_RESET_URL:https://scorestv.com/auth/reset-password}

  storage:
    # NOT: StorageProperties bean prefix "scorestv.storage" — minio nested DEGIL.
    endpoint: ${MINIO_ENDPOINT}
    access-key: ${MINIO_ACCESS_KEY}
    secret-key: ${MINIO_SECRET_KEY}
    bucket: ${MINIO_BUCKET:scorestv-assets}
    public-url: ${MINIO_PUBLIC_URL:https://cdn.scorestv.com/scorestv-assets}
